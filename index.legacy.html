<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>גיטרה שלי - אקורדים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <style>
    .chord { color: #ef4444; font-weight: bold; }
    .song-text { white-space: pre-wrap; font-family: monospace; line-height: 1.85; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center my-6 text-indigo-700">🎸 גיטרה שלי</h1>
    <div id="status" class="text-center text-sm mb-4 text-green-600">מתחבר...</div>

    <div class="flex gap-2 mb-6">
      <button onclick="showTab(0)" class="tab-btn flex-1 py-3 bg-white rounded-2xl shadow font-bold">📋 שירים</button>
      <button onclick="showTab(1)" class="tab-btn flex-1 py-3 bg-white rounded-2xl shadow font-bold">➕ שיר חדש</button>
    </div>

    <div id="tab0">
      <input id="search" placeholder="חיפוש שיר או אמן..." class="w-full p-4 rounded-2xl shadow mb-4" onkeyup="filterSongs()">
      <div id="songs-list" class="space-y-3"></div>
    </div>

    <div id="tab1" class="hidden">
      <form id="song-form" class="bg-white p-8 rounded-3xl shadow">
        <input id="title" placeholder="שם השיר" class="w-full p-4 border rounded-2xl mb-4" required>
        <input id="artist" placeholder="אמן" class="w-full p-4 border rounded-2xl mb-4" required>
        <textarea id="content" rows="15" placeholder="הדבק מילים + אקורדים" 
                  class="w-full p-4 border rounded-3xl font-mono"></textarea>
        <button type="submit" class="mt-6 w-full bg-indigo-600 text-white py-4 rounded-2xl text-xl font-bold">שמור שיר</button>
      </form>
    </div>
  </div>

  <!-- Song Viewer -->
  <div id="viewer" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[95vh] overflow-auto">
      <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
        <div>
          <h2 id="view-title" class="text-2xl font-bold"></h2>
          <p id="view-artist" class="text-gray-500"></p>
        </div>
        <button onclick="closeViewer()" class="text-3xl">✕</button>
      </div>
      <div class="p-6">
        <div class="flex flex-wrap gap-2 mb-6">
          <button onclick="transpose(-1)" class="px-5 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl">−1</button>
          <button onclick="transpose(1)" class="px-5 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl">+1</button>
          <button onclick="easyVersion()" class="px-5 py-3 bg-green-500 text-white rounded-2xl">גרסה קלה</button>
          <button onclick="copyToClipboard()" class="px-5 py-3 bg-blue-500 text-white rounded-2xl">העתק</button>
          <button onclick="toggleDirection()" class="px-5 py-3 bg-purple-500 text-white rounded-2xl">LTR / RTL</button>
        </div>
        <div id="view-content" class="song-text text-lg leading-relaxed" 
             style="direction: rtl; text-align: right; unicode-bidi: plaintext;"></div>
      </div>
    </div>
  </div>

  <script>
    // ==================== Firebase Config ====================
     const firebaseConfig = {
	  apiKey: "AIzaSyAXqi2nyYSEiZojRadQFPEYTzpL1_i9iFg",
	  authDomain: "chord-book-543fa.firebaseapp.com",
	  projectId: "chord-book-543fa",
	  storageBucket: "chord-book-543fa.firebasestorage.app",
	  messagingSenderId: "103654808905",
	  appId: "1:103654808905:web:a41060c18890e1038b4e98"
	};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserId = null;
    let allSongs = [];
    let currentSong = null;
    let originalContent = "";
    let transposeLevel = 0;
    let isLTR = false;

    const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

    auth.signInAnonymously().then(() => {
      currentUserId = auth.currentUser.uid;
      document.getElementById('status').textContent = '✅ מחובר ומסונכרן';
      loadSongs();
    });

    async function loadSongs() {
      const snap = await db.collection('songs')
        .where('userId', '==', currentUserId)
        .orderBy('updatedAt', 'desc')
        .get();
      allSongs = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderSongList();
    }

    function renderSongList(filtered = allSongs) {
      const html = filtered.map(song => `
        <div onclick="openSong('${song.id}')" class="bg-white p-6 rounded-3xl shadow hover:shadow-xl cursor-pointer">
          <div class="font-bold text-xl">${song.title}</div>
          <div class="text-gray-500">${song.artist}</div>
        </div>
      `).join('');
      document.getElementById('songs-list').innerHTML = html || '<p class="text-center py-10 text-gray-400">אין שירים עדיין</p>';
    }

    document.getElementById('song-form').addEventListener('submit', async e => {
      e.preventDefault();
      const newSong = {
        title: document.getElementById('title').value.trim(),
        artist: document.getElementById('artist').value.trim(),
        content: document.getElementById('content').value.trim(),
        userId: currentUserId,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await db.collection('songs').add(newSong);
      alert('✅ השיר נשמר!');
      e.target.reset();
      showTab(0);
      loadSongs();
    });

    function showTab(n) {
      document.querySelectorAll('#tab0, #tab1').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab' + n).classList.remove('hidden');
    }

    function filterSongs() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = allSongs.filter(s => 
        s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term)
      );
      renderSongList(filtered);
    }

    function openSong(id) {
      currentSong = allSongs.find(s => s.id === id);
      if (!currentSong) return;
      
      originalContent = currentSong.content;
      transposeLevel = 0;
      isLTR = false;

      document.getElementById('view-title').textContent = currentSong.title;
      document.getElementById('view-artist').textContent = currentSong.artist;
      document.getElementById('view-content').innerHTML = formatChords(originalContent);
      document.getElementById('view-content').style.direction = 'rtl';
      document.getElementById('view-content').style.textAlign = 'right';
      document.getElementById('viewer').classList.remove('hidden');
    }

    function closeViewer() {
      document.getElementById('viewer').classList.add('hidden');
    }

    function formatChords(text) {
      return text.replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>');
    }

    function transpose(dir) {
      transposeLevel += dir;
      let newText = originalContent.replace(/\[([^\]]+)\]/g, (match, chord) => {
        return '[' + transposeChord(chord, transposeLevel) + ']';
      });
      document.getElementById('view-content').innerHTML = formatChords(newText);
    }

    function transposeChord(chord, semitones) {
      const match = chord.match(/^[A-G](#|b)?/);
      if (!match) return chord;
      const root = match[0];
      let idx = notes.indexOf(root);
      if (idx === -1) return chord;
      const newIdx = (idx + semitones + 12) % 12;
      return notes[newIdx] + chord.slice(root.length);
    }

    function easyVersion() {
      let text = originalContent;
      text = text.replace(/maj7|7|m7|dim|sus4|add9|9|11|13/g, '');
      document.getElementById('view-content').innerHTML = formatChords(text);
    }

    function copyToClipboard() {
      const text = document.getElementById('view-content').innerText;
      navigator.clipboard.writeText(text).then(() => alert('✅ הועתק ללוח!'));
    }

    function toggleDirection() {
      isLTR = !isLTR;
      const content = document.getElementById('view-content');
      content.style.direction = isLTR ? 'ltr' : 'rtl';
      content.style.textAlign = isLTR ? 'left' : 'right';
    }

    showTab(0);
  </script>
</body>
</html>
