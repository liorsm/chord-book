# גיבוי: אם לא רוצים "GitHub Actions" כ-Source ב-Settings → Pages,
# הפעל workflow זה ידנית (Actions → Deploy to gh-pages branch → Run workflow)
# ואז הגדר Pages: Deploy from branch → gh-pages → / (root)
name: Deploy to gh-pages branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          VITE_ADMIN_UIDS: ${{ secrets.VITE_ADMIN_UIDS }}

      - run: cp dist/index.html dist/404.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
